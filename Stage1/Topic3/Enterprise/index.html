<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Enterprise</title>

    <link rel="stylesheet" href="./styles/pages/home.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="container">
        <div class="header_content">
          <div class="header__logo">
            <img
              class="brand-logo"
              src="./assets/images/logo.svg"
              alt="Open Enterprise Logo" />
            <h1 class="brand-title">Open Enterprise</h1>
          </div>
          <nav class="header__nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a class="nav__link" href="#">Why Open Enterprise</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#">Features</a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#">Contribute</a>
              </li>
              <li class="nav__item">
                <a class="nav__link active" href="#">Request early access</a>
              </li>
            </ul>
          </nav>

          <button class="btn-ham">
            <img src="./assets/icons/ham.svg" alt="Menu" />
          </button>
        </div>
      </div>
    </header>
    <main>
      <section class="container">
        <div class="hero">
          <div class="hero-info">
            <h2 class="info-title">A new model for open collaboration</h2>
            <p class="info-desc">
              Run an organization where members get rewarded for their
              contributions with fractional ownership.
            </p>
            <button class="btn-main">Request early access</button>
          </div>
          <div class="hero-content">
            <img
              class="hero-img"
              src="./assets/images/hero.svg"
              alt="Hero Image" />
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="container">
        <p class="footer__text">© 2026 Open Enterprise. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
